<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    
    <title>Boost Your Facebook | AccessUG</title>
    <meta name="description" content="Get real Facebook followers and likes easily and safely.">
    
    <link rel="icon" href="../IMAGES/facebook.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-wrapper" class="toast-wrapper" aria-live="polite"></div>

    <div class="modal-backdrop" id="country-modal" aria-hidden="true">
        <div class="modal-surface">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div class="modal-icon">🌍</div>
                <h2>Choose your region</h2>
                <p>We use this to show you the correct prices.</p>
            </div>
            
            <div class="modal-options">
                <button class="region-btn" onclick="FbApp.setCountry('UGX')">
                    <span class="region-flag">🇺🇬</span>
                    <div class="region-info">
                        <span class="region-name">Uganda</span>
                        <span class="region-currency">Pay in UGX</span>
                    </div>
                    <i class="fas fa-arrow-right region-arrow"></i>
                </button>

                <button class="region-btn" onclick="FbApp.setCountry('USD')">
                    <span class="region-flag">🇸🇸</span>
                    <div class="region-info">
                        <span class="region-name">South Sudan</span>
                        <span class="region-currency">Pay in USD</span>
                    </div>
                    <i class="fas fa-arrow-right region-arrow"></i>
                </button>

                <button class="region-btn" onclick="FbApp.setCountry('USD')">
                    <span class="region-flag">🇨🇩</span>
                    <div class="region-info">
                        <span class="region-name">DR Congo</span>
                        <span class="region-currency">Pay in USD</span>
                    </div>
                    <i class="fas fa-arrow-right region-arrow"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="app-container">
        
        <nav class="top-nav">
            <a href="../index.html" class="nav-back">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <button class="nav-region" onclick="FbApp.openCountryModal()">
                <i class="fas fa-globe"></i> <span id="ui-region-badge">UGX</span>
            </button>
        </nav>

        <header class="hero-section">
            <div class="status-pill">
                <span class="pulse-dot"></span> System Active & Fast
            </div>
            <h1 class="hero-title">Boost your <br><span class="fb-gradient-text">Facebook</span></h1>
            <p class="hero-subtitle">Get real followers and likes. Simple, safe, and built to grow your page fast.</p>
        </header>

        <main class="content-flow">
            
            <section class="flow-step">
                <div class="step-header">
                    <div class="step-number">1</div>
                    <h2 class="step-title">Choose a Package</h2>
                </div>
                
                <div class="package-list" id="package-list">
                    </div>
            </section>

            <section class="flow-step">
                <div class="step-header">
                    <div class="step-number">2</div>
                    <h2 class="step-title">Your Details</h2>
                </div>
                
                <div class="form-card">
                    <div class="input-group">
                        <label for="fb-link">Facebook Page Link</label>
                        <div class="input-box">
                            <i class="fas fa-link input-icon"></i>
                            <input type="url" id="fb-link" placeholder="Paste your page link here..." autocomplete="off">
                        </div>
                        <p class="input-help">Example: https://facebook.com/yourpage</p>
                    </div>

                    <div class="referral-section">
                        <button class="ref-toggle" id="btn-ref-toggle" onclick="FbApp.toggleReferralUI()">
                            <i class="fas fa-gift"></i> I have a referral code
                        </button>
                        
                        <div class="ref-input-area" id="ref-drawer">
                            <div class="input-box small-box">
                                <input type="text" id="ref-code" placeholder="Enter name or code..." autocomplete="off">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="bottom-spacer"></div>
        </main>

        <footer class="checkout-bar">
            <div class="checkout-content">
                <div class="checkout-text">
                    <span class="total-caption">Total Price</span>
                    <div class="price-display">
                        <span id="ui-price-value" class="price-value">0</span>
                        <span id="ui-price-currency" class="price-currency">UGX</span>
                    </div>
                </div>
                
                <button class="pay-btn" id="btn-pay" onclick="FbApp.submitOrder()" disabled>
                    <span id="btn-text">Select a Package</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
