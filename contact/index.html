<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccessUG | Neural Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* CRITICAL: ISOLATED SCOPE TO PREVENT CONFLICTS */
        /* See the CSS Section below for the full styles */
    </style>
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <div id="neural-support">
        
        <nav class="neural-nav">
            <a href="index.html" class="nav-back"><i class="fas fa-chevron-left"></i> Return to Base</a>
            <div class="nav-status"><span class="pulse"></span> System Online</div>
        </nav>

        <main class="core-container">
            
            <div class="chat-column">
                <div class="chat-window" id="chat-feed">
                    <div class="msg bot-msg animate-pop">
                        <div class="avatar"><i class="fas fa-robot"></i></div>
                        <div class="text">Welcome to the Cartel Core. I am your automated specialist.<br>Select a module to begin diagnostics.</div>
                    </div>
                </div>
            </div>

            <div class="modules-column" id="modules-grid">
                
                <button class="neuro-card" onclick="triggerIssue('netflix-household')" style="--theme: #E50914;">
                    <div class="glitch-icon"><i class="fas fa-house-signal"></i></div>
                    <div class="card-text">
                        <h3>Household Fix</h3>
                        <p>Netflix "Not part of Household" error.</p>
                    </div>
                    <div class="scan-line"></div>
                </button>

                <button class="neuro-card" onclick="triggerIssue('netflix-download')" style="--theme: #B81D24;">
                    <div class="glitch-icon"><i class="fas fa-download"></i></div>
                    <div class="card-text">
                        <h3>Download Fail</h3>
                        <p>Can't save movies offline?</p>
                    </div>
                    <div class="scan-line"></div>
                </button>

                <button class="neuro-card" onclick="triggerIssue('disconnected')" style="--theme: #FFD700;">
                    <div class="glitch-icon"><i class="fas fa-hourglass-end"></i></div>
                    <div class="card-text">
                        <h3>Early Disconnect</h3>
                        <p>Logged out before time expired?</p>
                    </div>
                    <div class="scan-line"></div>
                </button>

                <button class="neuro-card" onclick="triggerIssue('spotify')" style="--theme: #1DB954;">
                    <div class="glitch-icon"><i class="fab fa-spotify"></i></div>
                    <div class="card-text">
                        <h3>Spotify Glitch</h3>
                        <p>Premium not working / Kickout.</p>
                    </div>
                    <div class="scan-line"></div>
                </button>

                <button class="neuro-card" onclick="triggerIssue('prime')" style="--theme: #00A8E1;">
                    <div class="glitch-icon"><i class="fab fa-amazon"></i></div>
                    <div class="card-text">
                        <h3>Prime Video</h3>
                        <p>Can't watch specific titles.</p>
                    </div>
                    <div class="scan-line"></div>
                </button>

            </div>

        </main>

    </div>

    <script src="support-core.js"></script> 
</body>
</html>
