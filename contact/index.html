<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccessUG | Neural Support</title>
    <link rel="icon" href="../IMAGES/logo.png" type="image/png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="fluid-bg"></canvas>
    <div class="noise-overlay"></div>

    <div class="app-container">
        
        <nav class="glass-nav">
            <a href="../index.html" class="nav-pill">
                <i class="fas fa-chevron-left"></i> <span>Return to Base</span>
            </a>
            <div class="nav-status">
                <span class="led-blink"></span> SYSTEM ONLINE
            </div>
        </nav>

        <main class="neural-grid">
            
            <section class="chat-zone">
                <div class="glass-panel chat-panel" id="chat-panel">
                    <div class="panel-header">
                        <div class="bot-id">
                            <div class="avatar-ring">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="bot-meta">
                                <h3>AccessUG Core</h3>
                                <p>Automated Diagnostics</p>
                            </div>
                        </div>
                        <div class="scan-line"></div>
                    </div>

                    <div class="chat-viewport" id="chat-feed">
                        </div>

                    <div class="input-dock" id="input-dock">
                        <input type="text" id="user-input" placeholder="Select an issue to begin..." disabled autocomplete="off">
                        <button id="send-btn" disabled><i class="fas fa-arrow-up"></i></button>
                    </div>
                </div>
            </section>

            <section class="command-zone">
                <div class="zone-header">
                    <h2>Select Protocol</h2>
                    <p>Initialize a fix for your service.</p>
                </div>

                <div class="card-stack">
                    
                    <button class="holo-card" onclick="startFlow('household')" onmouseenter="shiftColor('red')" onmouseleave="resetColor()">
                        <div class="card-glow" style="--c: #E50914;"></div>
                        <div class="icon-box"><i class="fas fa-house-signal"></i></div>
                        <div class="card-data">
                            <h3>Netflix Household</h3>
                            <p>Update Location / Email Fix</p>
                        </div>
                    </button>

                    <button class="holo-card" onclick="startFlow('netflix_limit')" onmouseenter="shiftColor('red')" onmouseleave="resetColor()">
                        <div class="card-glow" style="--c: #B81D24;"></div>
                        <div class="icon-box"><i class="fas fa-tablet-screen-button"></i></div>
                        <div class="card-data">
                            <h3>Netflix Download/Limit</h3>
                            <p>Screen limit or Download fail</p>
                        </div>
                    </button>

                    <button class="holo-card" onclick="startFlow('prime')" onmouseenter="shiftColor('blue')" onmouseleave="resetColor()">
                        <div class="card-glow" style="--c: #00A8E1;"></div>
                        <div class="icon-box"><i class="fab fa-amazon"></i></div>
                        <div class="card-data">
                            <h3>Prime Video</h3>
                            <p>Device Limit / Playback Error</p>
                        </div>
                    </button>

                    <button class="holo-card" onclick="startFlow('spotify')" onmouseenter="shiftColor('green')" onmouseleave="resetColor()">
                        <div class="card-glow" style="--c: #1DB954;"></div>
                        <div class="icon-box"><i class="fab fa-spotify"></i></div>
                        <div class="card-data">
                            <h3>Spotify Status</h3>
                            <p>Premium Check</p>
                        </div>
                    </button>

                    <button class="holo-card agent-card" onclick="startFlow('agent')" onmouseenter="shiftColor('purple')" onmouseleave="resetColor()">
                        <div class="card-glow" style="--c: #7D2AE8;"></div>
                        <div class="icon-box"><i class="fas fa-headset"></i></div>
                        <div class="card-data">
                            <h3>Speak to Agent</h3>
                            <p>General Inquiries</p>
                        </div>
                    </button>

                </div>
            </section>

        </main>
    </div>

    <script src="support-core.js"></script>
</body>
</html>
