<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Nexus | AccessUG</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="nexus.css">
</head>
<body>

    <canvas id="nexus-canvas"></canvas>

    <div id="hud-layer">
        
        <nav class="hud-nav">
            <a href="../index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> SYSTEM_EXIT</a>
            <div class="nav-center">NEXUS CONTROL // <span id="target-readout">IDLE</span></div>
            <div class="nav-status"><span class="blink"></span> ONLINE</div>
        </nav>

        <div id="intro-hint" class="center-hint">
            <div class="hint-icon"><i class="fas fa-computer-mouse"></i></div>
            <p>SELECT A MODULE TO ENGAGE</p>
        </div>

        <div id="neural-interface" class="interface-hidden">
            <div class="chat-glass-panel">
                <div class="chat-header">
                    <div class="header-info">
                        <i class="fas fa-robot" id="ai-icon"></i>
                        <div>
                            <h3 id="chat-title">DIAGNOSTICS</h3>
                            <p id="chat-sub">Automated Support Agent</p>
                        </div>
                    </div>
                    <button class="close-btn" onclick="nexus.disengage()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="chat-feed" id="chat-feed">
                    </div>
            </div>
        </div>

        <div class="social-dock">
            <a href="https://wa.me/256762193386" target="_blank" class="dock-item wa">
                <i class="fab fa-whatsapp"></i>
                <span class="tooltip">WhatsApp</span>
            </a>
            <a href="https://www.instagram.com/theaccessug" target="_blank" class="dock-item ig">
                <i class="fab fa-instagram"></i>
                <span class="tooltip">Instagram</span>
            </a>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="nexus.js"></script>
</body>
</html>
