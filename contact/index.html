<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | AccessUG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="neuro-bg"></canvas>

    <div class="support-wrapper">
        
        <nav class="glass-nav">
            <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
            <div class="logo-area">
                <span class="status-dot"></span> Live Support
            </div>
        </nav>

        <main class="main-stage">
            
            <section class="chat-section">
                <div class="glass-window">
                    <div class="chat-header">
                        <div class="bot-avatar"><i class="fas fa-robot"></i></div>
                        <div class="bot-info">
                            <h3>AccessUG Assistant</h3>
                            <p>Online • Ready to help</p>
                        </div>
                    </div>
                    
                    <div class="chat-feed" id="chat-feed">
                        </div>

                    <div class="chat-input-area disabled">
                        <input type="text" placeholder="Select an issue to start..." disabled>
                        <button><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </section>

            <section class="options-section">
                <h2 class="section-title">What can we fix for you?</h2>
                
                <div class="cards-grid">
                    
                    <button class="issue-card" onclick="runScript('household')" style="--glow: #E50914;">
                        <div class="card-icon"><i class="fas fa-house-user"></i></div>
                        <div class="card-text">
                            <h3>Netflix Household</h3>
                            <p>"Not part of household" error?</p>
                        </div>
                        <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                    </button>

                    <button class="issue-card" onclick="runScript('download')" style="--glow: #ff4757;">
                        <div class="card-icon"><i class="fas fa-download"></i></div>
                        <div class="card-text">
                            <h3>Can't Download</h3>
                            <p>Movies won't save offline?</p>
                        </div>
                        <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                    </button>

                    <button class="issue-card" onclick="runScript('logout')" style="--glow: #ffa502;">
                        <div class="card-icon"><i class="fas fa-plug-circle-xmark"></i></div>
                        <div class="card-text">
                            <h3>Logged Out Early</h3>
                            <p>Account stopped working?</p>
                        </div>
                        <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                    </button>

                    <button class="issue-card" onclick="runScript('spotify')" style="--glow: #1DB954;">
                        <div class="card-icon"><i class="fab fa-spotify"></i></div>
                        <div class="card-text">
                            <h3>Spotify Issues</h3>
                            <p>Premium not active?</p>
                        </div>
                        <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                    </button>

                    <button class="issue-card" onclick="runScript('other')" style="--glow: #3742fa;">
                        <div class="card-icon"><i class="fas fa-headset"></i></div>
                        <div class="card-text">
                            <h3>Something Else</h3>
                            <p>Talk to a human agent.</p>
                        </div>
                        <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                    </button>

                </div>
            </section>

        </main>
    </div>

    <script src="support-core.js"></script>
</body>
</html>
