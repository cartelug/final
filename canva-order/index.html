<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Pro - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { margin: 0; background: #0e0e1a; color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Liquid Gradient */
        .liquid-bg {
            position: absolute; inset: 0; 
            background: radial-gradient(circle at 50% 50%, #7D2AE8, #00C4CC, #0e0e1a);
            background-size: 200% 200%;
            animation: flow 10s ease infinite; opacity: 0.3; z-index: -1;
        }
        
        .container { text-align: center; position: relative; z-index: 2; padding: 20px; }
        
        .brand-text {
            font-size: 4rem; font-weight: 900; 
            background: linear-gradient(90deg, #00C4CC, #7D2AE8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        h2 { font-size: 1.5rem; font-weight: 400; margin: 0 0 40px; color: #ccc; }
        
        .btn {
            text-decoration: none; color: #fff; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 35px; border-radius: 12px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 10px;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn:hover { background: #fff; color: #7D2AE8; box-shadow: 0 10px 30px rgba(125, 42, 232, 0.3); }
        
        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>
    <div class="liquid-bg"></div>
    <div class="container">
        <div class="brand-text">Canva Pro</div>
        <h2>Designing the Experience...</h2>
        
        <a href="../index.html#services" class="btn">
            Explore Other Services <i class="fas fa-palette"></i>
        </a>
    </div>
</body>
</html>
