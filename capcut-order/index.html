<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCut Pro - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Glitch Background */
        .glitch-bg { position: absolute; inset: 0; background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjMTAxMDEwIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMyMDIwMjAiLz4KPC9zdmc+'); opacity: 0.5; z-index: -1; }
        
        .container { text-align: center; position: relative; z-index: 2; padding: 20px; }
        
        .icon-box { font-size: 4rem; margin-bottom: 20px; animation: glitch-anim 2s infinite; display: inline-block; }
        
        h1 { font-size: 3rem; font-weight: 900; margin: 0 0 10px; letter-spacing: -1px; }
        p { color: #888; font-size: 1.1rem; margin-bottom: 40px; }
        
        /* Glitch Button */
        .btn {
            text-decoration: none; color: #000; background: #fff;
            padding: 15px 30px; border-radius: 50px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 10px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="glitch-bg"></div>
    <div class="container">
        <div class="icon-box"><i class="fas fa-cut"></i></div>
        <h1>Loading Pro Tools...</h1>
        <p>CapCut Pro is coming Soon.</p>
        
        <a href="../index.html#services" class="btn">
            Explore Other Services <i class="fas fa-arrow-right"></i>
        </a>
    </div>
</body>
</html>
