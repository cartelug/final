<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple TV+ - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #f5f5f7; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .logo-area { font-size: 3.5rem; margin-bottom: 20px; }
        .logo-area i { margin-right: 10px; }
        
        h1 { font-size: 2.5rem; font-weight: 600; margin: 0 0 15px; letter-spacing: -0.5px; }
        p { color: #86868b; font-size: 1.2rem; margin-bottom: 50px; font-weight: 300; }
        
        .btn {
            text-decoration: none; color: #1d1d1f; background: #fff;
            padding: 12px 24px; border-radius: 50px; font-weight: 500; font-size: 1rem;
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:hover { transform: scale(1.02); background: #f5f5f7; }
        
        /* Subtle Breathe Animation */
        .logo-area { animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div class="container" style="text-align: center;">
        <div class="logo-area">
            <i class="fab fa-apple"></i> <span>tv+</span>
        </div>
        <h1>Coming Soon</h1>
        <p>The future of cinema is loading.</p>
        
        <a href="../index.html#services" class="btn">
            Explore Other Services
        </a>
    </div>
</body>
</html>
