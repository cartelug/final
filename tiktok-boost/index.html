<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Elite Growth | AccessUG</title>
    <link rel="icon" href="../IMAGES/tiktok.png" type="image/png">
    
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="followers">

    <div class="light-ambient-bg">
        <div class="glow-orb orb-cyan"></div>
        <div class="glow-orb orb-pink"></div>
    </div>

    <nav class="app-nav">
        <a href="../index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        <div class="currency-pills">
            <button class="cur-pill active" onclick="setCurrency('UGX')" id="curr-UGX">UGX</button>
            <button class="cur-pill" onclick="setCurrency('SSP')" id="curr-SSP">SSP</button>
            <button class="cur-pill" onclick="setCurrency('USD')" id="curr-USD">USD</button>
        </div>
    </nav>

    <main class="app-container">
        
        <header class="page-header">
            <div class="tt-logo"><i class="fab fa-tiktok"></i></div>
            <h1>Elite Growth Dashboard</h1>
            <p>Customize your campaign. Instant deployment.</p>
        </header>

        <div class="dashboard-card">
            
            <div class="control-group">
                <label>1. Select Campaign Type</label>
                <div class="service-tabs">
                    <button class="s-tab active" onclick="setService('followers')" id="tab-followers">
                        <i class="fas fa-users"></i> Followers
                    </button>
                    <button class="s-tab" onclick="setService('likes')" id="tab-likes">
                        <i class="fas fa-heart"></i> Likes
                    </button>
                    <button class="s-tab" onclick="setService('views')" id="tab-views">
                        <i class="fas fa-play"></i> Views
                    </button>
                </div>
            </div>

            <div class="control-group">
                <div class="header-flex">
                    <label id="slider-label">2. Target Volume</label>
                    <div class="live-metric"><span id="metric-output">1,000</span> <span id="metric-name">Followers</span></div>
                </div>
                
                <div class="slider-wrapper">
                    <input type="range" id="volume-slider" class="smooth-slider" oninput="syncVolume()">
                    <div class="slider-ticks" id="volume-ticks">
                        <span>1k</span><span>10k</span>
                    </div>
                </div>
            </div>

            <div class="control-group split-group" id="split-engine">
                <div class="header-flex">
                    <label>Distribute Across Posts</label>
                    <div class="live-metric"><span id="split-output">1</span> Post</div>
                </div>
                
                <div class="slider-wrapper">
                    <input type="range" id="split-slider" class="smooth-slider split-slider" min="1" max="5" step="1" value="1" oninput="syncSplit()">
                    <div class="slider-ticks">
                        <span>1 Post</span><span>5 Posts</span>
                    </div>
                </div>
                <div class="split-math" id="split-math">
                    <i class="fas fa-magic"></i> All engagement goes to your latest post.
                </div>
            </div>

            <div class="control-group">
                <label>3. Target Destination</label>
                <div class="input-modern">
                    <i class="fas fa-link"></i>
                    <input type="text" id="target-link" placeholder="Enter TikTok Username or Link">
                </div>
            </div>

            <div class="referral-box">
                <div class="ref-header">
                    <span>Did a friend refer you?</span>
                    <div class="ref-switches">
                        <button class="ref-btn active" id="ref-no" onclick="toggleReferral(false)">No</button>
                        <button class="ref-btn" id="ref-yes" onclick="toggleReferral(true)">Yes</button>
                    </div>
                </div>
                <div class="ref-body" id="ref-body">
                    <input type="text" id="referral-code" placeholder="What is their name?">
                </div>
            </div>

        </div>

        <div class="sticky-checkout">
            <div class="checkout-content">
                <div class="price-block">
                    <span class="price-title">Total Investment</span>
                    <div class="price-amount"><span id="final-price">75,000</span> <span id="final-curr" class="curr-tag">UGX</span></div>
                </div>
                <button class="btn-deploy" onclick="deployCampaign()">
                    Deploy Now <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
