<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite TikTok Boost | AccessUG</title>
    <link rel="icon" href="../IMAGES/tiktok.png" type="image/png">
    
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="elite-canvas">

    <div class="ambient-canvas">
        <div class="fluid-orb orb-1"></div>
        <div class="fluid-orb orb-2"></div>
        <div class="canvas-noise"></div>
    </div>

    <div class="region-veil" id="region-sheet">
        <div class="region-sheet-content">
            <div class="drag-handle"></div>
            <h2>Select Region</h2>
            <p>Pricing aligns automatically.</p>
            
            <div class="region-options">
                <button class="r-tile" onclick="initRegion('UGX')">
                    <span class="r-emoji">🇺🇬</span>
                    <div class="r-meta"><strong>Uganda</strong><span>UGX Pricing</span></div>
                </button>
                <button class="r-tile" onclick="initRegion('USD')">
                    <span class="r-flag">🇸🇸</span>
                    <div class="r-meta"><strong>South Sudan</strong><span>USD Pricing</span></div>
                </button>
                <button class="r-tile" onclick="initRegion('USD')">
                    <span class="r-flag">🇨🇩</span>
                    <div class="r-meta"><strong>DR Congo</strong><span>USD Pricing</span></div>
                </button>
            </div>
        </div>
    </div>

    <div class="mixing-console">
        
        <header class="console-header">
            <div class="header-top">
                <a href="../index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
                <button class="btn-region" onclick="openRegionSheet()"><i class="fas fa-globe"></i> <span id="current-region">UGX</span></button>
            </div>
            <div class="header-titles">
                <div class="tt-icon"><i class="fab fa-tiktok"></i></div>
                <h1>Algorithm Boost</h1>
                <p>Tap a tile to select. Bundle for an instant 10% discount.</p>
            </div>
        </header>

        <main class="console-tracks">
            
            <div class="track-section">
                <div class="track-label">
                    <h3><i class="fas fa-user-astronaut"></i> Followers</h3>
                    <span>Permanent Authority</span>
                </div>
                <div class="horizontal-track" id="track-followers">
                    </div>
            </div>

            <div class="track-section">
                <div class="track-label">
                    <h3><i class="fas fa-heart"></i> Likes</h3>
                    <span id="bonus-views-label">Includes Free Views</span>
                </div>
                <div class="horizontal-track" id="track-likes">
                    </div>
            </div>

            <div class="buffer-space"></div>
        </main>

        <div class="action-dock">
            <div class="dock-inner">
                
                <div class="input-layer">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="client-name" placeholder="Your Name or TikTok Handle" autocomplete="off">
                </div>

                <div class="math-layer">
                    <div class="math-tags">
                        <span class="math-tag combo-tag" id="tag-combo"><i class="fas fa-magic"></i> 10% Saved</span>
                        <span class="math-tag vip-tag" id="tag-vip"><i class="fas fa-crown"></i> VIP Cap Applied</span>
                    </div>
                    
                    <div class="math-readout">
                        <span class="old-price" id="math-old"></span>
                        <span class="final-price" id="math-final">0</span>
                        <span class="currency" id="math-curr">UGX</span>
                    </div>
                </div>

                <button class="btn-execute" id="btn-execute" onclick="executePayload()">
                    <span id="btn-text">Secure Order</span>
                    <i class="fas fa-lock" id="btn-icon"></i>
                    <div class="spinner" id="btn-spinner"></div>
                </button>
                
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
